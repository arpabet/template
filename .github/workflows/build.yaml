name:  Template CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Keep go.arpabet.com modules off Google's public module proxy/checksum DB:
# GOPRIVATE expands to GONOPROXY + GONOSUMDB, so these modules are fetched
# directly from source and not cached by proxy.golang.org / sum.golang.org.
env:
  GOPRIVATE: go.arpabet.com/*

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install packages
        run: npm install --prefix webapp

      - name: Generate webapp
        run: npm run generate --prefix webapp

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes curl make unzip

      - name: Install protoc
        run: sudo bash .github/scripts/install-protoc.sh 3.20.3

      - name: Verify protoc
        run: protoc --version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install dependencies
        run: make deps

      - name: Build
        run: make
